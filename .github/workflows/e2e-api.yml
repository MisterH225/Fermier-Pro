# Postgres de service = équivalent technique à une base Supabase (Postgres) pour CI,
# sans dépendre du projet cloud du contributeur.
name: API e2e (contrat mobile)

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  e2e-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: fermier
          POSTGRES_PASSWORD: fermier_e2e
          POSTGRES_DB: fermier_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fermier -d fermier_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://fermier:fermier_e2e@localhost:5432/fermier_e2e
      SUPABASE_JWT_SECRET: ci-e2e-jwt-secret-for-automated-tests-only

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Prisma schema push
        run: npm run prisma:push --workspace @fermier/api
      - name: Run API e2e suite
        run: npm run test:e2e
