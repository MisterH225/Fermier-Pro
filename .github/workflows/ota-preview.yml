name: OTA Preview

on:
  workflow_dispatch:
    inputs:
      message:
        description: Message de la mise à jour OTA
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update (preview)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          MSG="${{ github.event.inputs.message }}"
          if [[ -z "$MSG" ]]; then
            MSG="OTA preview fix crash démarrage (${GITHUB_SHA:0:7})"
          fi
          bash scripts/ota.sh preview "$MSG"
