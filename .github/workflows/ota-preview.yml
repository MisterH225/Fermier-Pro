name: OTA Preview

on:
  push:
    branches: [main]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "scripts/ota*.sh"
      - ".github/workflows/ota-preview.yml"
  workflow_dispatch:
    inputs:
      message:
        description: Message de la mise à jour OTA
        required: false
        default: ""

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish EAS Update (preview)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          if [[ -z "${EXPO_TOKEN:-}" ]]; then
            echo "::warning::EXPO_TOKEN non configuré — OTA ignorée. Ajoutez le secret dans Settings → Secrets → Actions."
            exit 0
          fi
          MSG="${{ github.event.inputs.message }}"
          if [[ -z "$MSG" ]]; then
            MSG="OTA preview (${GITHUB_SHA:0:7}) — $(date -u +%Y-%m-%dT%H:%MZ)"
          fi
          bash scripts/ota.sh preview "$MSG"
